name: CI

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

jobs:
  build:
    name: build-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs full git history

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ./Abstractions.sln --verbosity minimal -m:1

      - name: Vulnerability audit
        shell: pwsh
        run: |
          $audit = dotnet list ./Abstractions.sln package --vulnerable --include-transitive
          $audit | Write-Host

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          if ($audit -match 'has the following vulnerable packages') {
            throw "Vulnerable packages found."
          }

      - name: Format
        run: dotnet format ./Abstractions.sln --verify-no-changes --verbosity minimal --no-restore

      - name: Build
        run: dotnet build ./Abstractions.sln --configuration Release --no-restore --verbosity minimal -m:1

      - name: Test
        run: dotnet test ./tests/Abstractions.UnitTests/Abstractions.UnitTests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --collect "XPlat Code Coverage" --results-directory artifacts/test-results --verbosity minimal

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results

      - name: Pack
        if: matrix.os == 'ubuntu-latest'
        run: dotnet pack ./src/Abstractions.NuGet/Abstractions.NuGet.csproj --configuration Release --no-build --output artifacts/packages --verbosity minimal -p:EnablePackageValidation=true

      - name: Upload packages
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
